<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Risk Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="header">
            <div class="status-indicator"></div>
            <h1>Traffic Risk AI</h1>
            <p>Predictive severity analysis based on live telemetry.</p>
        </header>

        <main class="bento-grid">
            <div class="card form-card">
                <form id="predictionForm">
                    <div class="input-group">
                        <h3>Environment Data</h3>
                        <div class="grid-2">
                            <input type="number" id="Hour" placeholder="Hour (0-23)" required>
                            <input type="number" id="Weekday" placeholder="Weekday (0-6)" required>
                            <input type="number" id="Month" placeholder="Month (1-12)" required>
                            <input type="number" step="0.1" id="Temperature" placeholder="Temp (°F)" required>
                            <input type="number" step="0.1" id="Visibility" placeholder="Visibility (mi)" required>
                            <input type="number" step="0.1" id="Wind_Speed" placeholder="Wind Speed (mph)" required>
                        </div>
                        <input type="text" id="Weather" class="full-width" placeholder="Weather (e.g., Clear, Rain, Snow)" required>
                    </div>

                    <div class="input-group">
                        <h3>Infrastructure Presence (1 = Yes, 0 = No)</h3>
                        <div class="grid-4">
                            <input type="number" id="Junction" placeholder="Junction" min="0" max="1" required>
                            <input type="number" id="Traffic_Signal" placeholder="Signal" min="0" max="1" required>
                            <input type="number" id="Crossing" placeholder="Crossing" min="0" max="1" required>
                            <input type="number" id="Stop" placeholder="Stop" min="0" max="1" required>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="primary-btn">Execute Analysis</button>
                </form>
            </div>

            <div class="card result-card" id="resultCard">
                <div class="result-content">
                    <h3 id="resultTitle">System Ready</h3>
                    <div class="score-display">
                        <span id="riskScore">--</span><span class="percent">%</span>
                    </div>
                    <p id="severityLabel">Awaiting telemetry data...</p>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
